---
# Analytics Consumer — drains analytics.events.raw Kafka topic and calls
# analytics_write_internal on Nakama to normalize + persist each batch.
#
# Prerequisites:
#   kubectl create secret generic analytics-consumer-secrets \
#     --from-literal=nakama-http-key=<HTTP_KEY> \
#     --from-literal=internal-write-key=<ANALYTICS_INTERNAL_WRITE_KEY> \
#     -n <namespace>
#
# Deploy:
#   kubectl apply -f k8s/analytics-consumer-deployment.yaml -n <namespace>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-consumer
  labels:
    app: analytics-consumer
    component: analytics-pipeline
spec:
  # Scale replicas for throughput. Each replica = 1 Kafka consumer in the group.
  # At 1M DAU: start with 3 replicas (each handles ~300K events/day comfortably).
  replicas: 2
  selector:
    matchLabels:
      app: analytics-consumer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: analytics-consumer
        component: analytics-pipeline
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: consumer
          image: ivx/analytics-consumer:1.0.0
          imagePullPolicy: Always
          env:
            - name: KAFKA_BROKER
              value: "redpanda:9092"
            - name: KAFKA_TOPIC
              value: "analytics.events.raw"
            - name: KAFKA_GROUP_ID
              value: "analytics-processor"
            - name: NAKAMA_URL
              value: "http://nakama:7350"
            - name: NAKAMA_HTTP_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-consumer-secrets
                  key: nakama-http-key
            - name: ANALYTICS_INTERNAL_WRITE_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-consumer-secrets
                  key: internal-write-key
            - name: CONSUMER_BATCH_SIZE
              value: "100"
            - name: CONSUMER_MAX_WAIT_MS
              value: "500"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-consumer
  labels:
    app: analytics-consumer
spec:
  type: ClusterIP
  selector:
    app: analytics-consumer
  ports:
    - name: health
      port: 3000
      targetPort: 3000
---
# HorizontalPodAutoscaler — scales consumer replicas based on Kafka lag.
# Requires KEDA (https://keda.sh) for Kafka-based scaling trigger.
# Remove this if KEDA is not installed; use manual replicas instead.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: analytics-consumer-scaler
spec:
  scaleTargetRef:
    name: analytics-consumer
  minReplicaCount: 2
  maxReplicaCount: 20
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: redpanda:9092
        consumerGroup: analytics-processor
        topic: analytics.events.raw
        lagThreshold: "50000"
        offsetResetPolicy: latest
