server {
    listen 8080;
    server_name _;

    # Force relative redirects so the original scheme (https) and host
    # (nakama-rest.intelli-verse-x.ai) are preserved when nginx issues a
    # 301. Without this, nginx would emit
    # http://<container-ip>:8080/admin-dashboard/ for the bare-prefix
    # redirect below, which leaks the internal port and downgrades to HTTP.
    absolute_redirect off;

    # Health probe (used by readiness/liveness probes).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Redirect bare prefix to trailing-slash form so relative asset
    # URLs in index.html resolve correctly.
    location = /admin-dashboard {
        return 301 /admin-dashboard/;
    }

    # Static dashboard.
    # The HTML lives at /usr/share/nginx/html/index.html (mounted from
    # the nakama-admin-dashboard-html ConfigMap).
    #
    # alias maps /admin-dashboard/<path>  →  /usr/share/nginx/html/<path>
    # try_files falls back to /admin-dashboard/index.html (which re-enters
    # this same location block) so any unknown sub-path serves the SPA.
    location /admin-dashboard/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /admin-dashboard/index.html;

        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
