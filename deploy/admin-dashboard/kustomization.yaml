# Kustomize bundle for the hardened Nakama admin dashboard.
#
# What this ships:
#   - Deployment `nakama-admin-dashboard` (2x Node static/proxy server)
#   - Service    `nakama-admin-dashboard` (ClusterIP :80)
#
# The Ingress is patched separately by deploy/admin-dashboard/apply.sh
# using a JSON patch (see ingress-patch.yaml for the rationale).
#
# Apply with:
#   bash deploy/admin-dashboard/apply.sh
#
# Or, manually (skips the index-safety check):
#   kubectl apply -k deploy/admin-dashboard/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aicart

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: nakama-admin-dashboard
      app.kubernetes.io/component: analytics-ui
      app.kubernetes.io/part-of: nakama
      app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - service.yaml

generatorOptions:
  disableNameSuffixHash: false
