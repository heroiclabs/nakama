apiVersion: apps/v1
kind: Deployment
metadata:
  name: nakama-admin-dashboard
  namespace: aicart
  labels:
    app: nakama-admin-dashboard
    component: analytics-ui
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: nakama-admin-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nakama-admin-dashboard
        component: analytics-ui
      annotations:
        checksum/restart: "proxy-v1"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin-dashboard
          image: 970547373533.dkr.ecr.us-east-1.amazonaws.com/nakama-admin-dashboard:edge-hardening-20260425
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ADMIN_DASHBOARD_BASE_PATH
              value: /admin-dashboard
            - name: ADMIN_DASHBOARD_PORT
              value: "8080"
            - name: NAKAMA_BASE_URL
              value: http://intelliverse-nakama.aicart.svc.cluster.local:7350
            - name: NAKAMA_HTTP_KEY
              valueFrom:
                secretKeyRef:
                  name: nakama-secret
                  key: http_key
                  optional: false
            - name: NAKAMA_CONSOLE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nakama-console-secret
                  key: username
                  optional: true
            - name: NAKAMA_CONSOLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nakama-console-secret
                  key: password
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
