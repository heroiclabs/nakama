# analytics-cron.yaml
#
# Kubernetes equivalent of the docker-compose `analytics_cron` sidecar.
# Applied by buildspec.yml post_build on every deploy so it's always
# up-to-date with the running Nakama version.
#
# Two CronJobs:
#   1. analytics-rollup         — 01:15 UTC daily  → analytics_rollup_run
#   2. analytics-external-poll  — every 6 hours    → external_poll_all
#
# Env vars are sourced from the nakama-secret k8s Secret:
#   http_key        → runtime HTTP key (required)
#   dashboard_secret→ admin RPC shared secret (falls back to hardcoded value)
#
# Nakama is reached via its cluster-internal Service URL so the jobs never
# leave the cluster. Change NAKAMA_INTERNAL_URL if your Service name differs.

---
# ─── 1. Daily analytics rollup ────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: analytics-rollup
  namespace: aicart
  labels:
    app: intelliverse-nakama
    component: analytics-cron
spec:
  schedule: "15 1 * * *"       # 01:15 UTC — after midnight, before dashboard checks
  timeZone: "UTC"
  concurrencyPolicy: Forbid     # never run two rollups at the same time
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: intelliverse-nakama
            component: analytics-rollup
        spec:
          restartPolicy: OnFailure
          containers:
          - name: rollup
            image: curlimages/curl:8.10.1
            command: ["/bin/sh", "-ec"]
            args:
            - |
              # BusyBox-safe "yesterday" (Alpine/curlimages uses BusyBox date)
              YEST_EPOCH=$(( $(date -u +%s) - 86400 ))
              YEST=$(date -u -d @${YEST_EPOCH} +%Y-%m-%d 2>/dev/null \
                  || date -u -r ${YEST_EPOCH} +%Y-%m-%d)
              echo "[analytics-rollup] running rollup for ${YEST}"
              HTTP_STATUS=$(curl -sf -o /tmp/rollup.json -w "%{http_code}" \
                -X POST "${NAKAMA_URL}/v2/rpc/analytics_rollup_run?http_key=${HTTP_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"date\":\"${YEST}\",\"dashboard_secret\":\"${DASHBOARD_SECRET}\"}" \
                || echo "000")
              echo "[analytics-rollup] status=${HTTP_STATUS}"
              head -c 500 /tmp/rollup.json 2>/dev/null; echo ""
              [ "${HTTP_STATUS}" = "200" ] || { echo "[analytics-rollup] FAILED"; exit 1; }
            env:
            - name: NAKAMA_URL
              value: "http://intelliverse-nakama.aicart.svc.cluster.local:7350"
            - name: HTTP_KEY
              valueFrom:
                secretKeyRef:
                  name: nakama-secret
                  key: http_key
                  optional: true
            - name: DASHBOARD_SECRET
              valueFrom:
                secretKeyRef:
                  name: nakama-secret
                  key: dashboard_secret
                  optional: true
            resources:
              requests:
                cpu: "10m"
                memory: "16Mi"
              limits:
                cpu: "100m"
                memory: "64Mi"

---
# ─── 2. External data pollers (Appodeal / App Store / UGS) ───────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: analytics-external-poll
  namespace: aicart
  labels:
    app: intelliverse-nakama
    component: analytics-cron
spec:
  schedule: "0 */6 * * *"      # every 6 hours
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: intelliverse-nakama
            component: analytics-external-poll
        spec:
          restartPolicy: OnFailure
          containers:
          - name: poller
            image: curlimages/curl:8.10.1
            command: ["/bin/sh", "-ec"]
            args:
            - |
              echo "[analytics-poll] running external_poll_all"
              HTTP_STATUS=$(curl -sf -o /tmp/poll.json -w "%{http_code}" \
                -X POST "${NAKAMA_URL}/v2/rpc/external_poll_all?http_key=${HTTP_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"dashboard_secret\":\"${DASHBOARD_SECRET}\"}" \
                || echo "000")
              echo "[analytics-poll] status=${HTTP_STATUS}"
              head -c 500 /tmp/poll.json 2>/dev/null; echo ""
              # Poller failures are non-fatal (3rd-party APIs can be flaky).
              [ "${HTTP_STATUS}" = "200" ] || echo "[analytics-poll] WARNING: status ${HTTP_STATUS} — will retry next cycle"
            env:
            - name: NAKAMA_URL
              value: "http://intelliverse-nakama.aicart.svc.cluster.local:7350"
            - name: HTTP_KEY
              valueFrom:
                secretKeyRef:
                  name: nakama-secret
                  key: http_key
                  optional: true
            - name: DASHBOARD_SECRET
              valueFrom:
                secretKeyRef:
                  name: nakama-secret
                  key: dashboard_secret
                  optional: true
            resources:
              requests:
                cpu: "10m"
                memory: "16Mi"
              limits:
                cpu: "100m"
                memory: "64Mi"
