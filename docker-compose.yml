services:
  cockroachdb:
    image: cockroachdb/cockroach:latest-v24.1
    command: start-single-node --insecure --store=attrs=ssd,path=/var/lib/cockroach/
    restart: unless-stopped
    volumes:
      - data:/var/lib/cockroach
    expose:
      - "8080"
      - "26257"
    ports:
      - "26257:26257"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 3s
      timeout: 3s
      retries: 5
  nakama:
    # Build a custom image that bakes in the analytics_metrics Go plugin.
    # The plugin registers native Prometheus counters/gauges on :9100 for
    # the analytics pipeline, which the stock image can't do from JS. See
    # `Dockerfile` and `go-plugin/main.go`. Dev-mode users can skip image
    # rebuilds with `scripts/build-plugin.ps1` which drops the .so into
    # data/modules/ for the volume mount.
    build:
      context: .
      dockerfile: Dockerfile
    image: ivx/nakama-analytics:3.35.0
    # NOTE: Nakama's JS runtime only exposes env vars passed via `--runtime.env`.
    # OS env vars from the `environment:` block below are NOT automatically visible
    # to RPCs via `ctx.env`. The entrypoint below forwards each whitelisted var
    # as a `--runtime.env KEY=VALUE` CLI flag, which is what makes them reach
    # `ctx.env` in analytics.js / external_analytics.js / analytics_admin.js.
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up --database.address root@cockroachdb:26257
        # Build --runtime.env flags dynamically from the process env.
        # Any var listed here (and present in `environment:` below) will be
        # visible to JS RPCs via ctx.env['NAME'].
        RUNTIME_ENV_KEYS="
          GOOGLE_MAPS_API_KEY LLM_PROVIDER ANTHROPIC_API_KEY OPENAI_API_KEY XAI_API_KEY
          QUESTS_ECONOMY_API_URL NAKAMA_WEBHOOK_SECRET DEFAULT_GAME_ID
          APPODEAL_API_KEY APPODEAL_USER_ID APPODEAL_QUIZVERSE_APP_KEY
          UNITY_KEY_ID UNITY_SECRET_KEY UNITY_AUTH_HEADER UNITY_QUIZVERSE_PROJECT_ID
          APPLE_KEY_ID APPLE_ISSUER_ID APPLE_PRIVATE_KEY APPLE_QUIZVERSE_BUNDLE_ID
          ADMIN_USERNAME ADMIN_PASSWORD_HASH DASHBOARD_SECRET
          ROLLUP_ENABLED EXTERNAL_POLLERS_ENABLED DASHBOARD_PREFER_ROLLUPS
          ANALYTICS_ENFORCE_SCHEMA
          SATORI_URL SATORI_API_KEY_NAME SATORI_API_KEY SATORI_SIGNING_KEY SATORI_HTTP_TIMEOUT_MS
          AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_REGION AWS_S3_BUCKET AWS_PRESIGNED_URL_EXPIRY S3_BASE_URL
          GNEWS_API_KEY CURRENTS_API_KEY MEDIASTACK_API_KEY NEWSAPI_API_KEY
          LASTFM_API_KEY TMDB_API_KEY NASA_API_KEY REST_COUNTRIES_API_KEY
          IVX_SYSTEM_USER_ID
          PUSH_REGISTER_URL PUSH_SEND_URL DEFAULT_FCM_PROJECT_ID
          SLACK_OPS_WEBHOOK_URL
          DISCORD_QV_OPS_WEBHOOK_URL DISCORD_NAKAMA_WEBHOOK_URL
          IVX_AI_SVC_BASE_URL IVX_INSIGHTS_SHARED_SECRET IVX_INSIGHTS_BUCKET_MS
          QUIZVERSE_N8N_BASE_URL QUIZVERSE_ADMIN_API_TOKEN
          REVENUECAT_SECRET_API_KEY REVENUECAT_PROJECT_ID
          QV_DOGCEO_BREED_SAMPLE
          QV_GET_QUESTIONS_RATE_MAX
        "
        RUNTIME_ENV_FLAGS=""
        for k in $$RUNTIME_ENV_KEYS; do
          v=$$(eval printf '%s' "\"\$$$$k\"")
          if [ -n "$$v" ]; then
            RUNTIME_ENV_FLAGS="$$RUNTIME_ENV_FLAGS --runtime.env $$k=$$v"
          fi
        done
        echo "[entrypoint] Forwarding $$(echo $$RUNTIME_ENV_FLAGS | grep -oE 'runtime.env [A-Z_]+' | wc -l) env vars to JS runtime via --runtime.env"

        # NOTE (2026-05-10): the --satori.* CLI flag forwarding that used to
        # live here was removed when satori_direct.js took over the Satori
        # client role with hardcoded credentials. Nakama no longer needs the
        # --satori.url / --satori.signing_key etc. flags for analytics to
        # work — see data/modules/satori_direct/satori_direct.js. The
        # SATORI_* env vars in the environment: block below are optional
        # overrides (sdResolve in satori_direct.js reads them via ctx.env);
        # leaving them empty makes the hardcoded constants kick in.

        exec /nakama/nakama \
          --name nakama1 \
          --database.address root@cockroachdb:26257 \
          --logger.level INFO \
          --session.token_expiry_sec 43200 \
          --metrics.prometheus_port 9100 \
          --runtime.path /nakama/data/data/modules \
          $$RUNTIME_ENV_FLAGS
    restart: unless-stopped
    links:
      - "cockroachdb:db"
    depends_on:
      cockroachdb:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - LLM_PROVIDER=claude
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - QUESTS_ECONOMY_API_URL=${QUESTS_ECONOMY_API_URL:-http://localhost:3001}
      - NAKAMA_WEBHOOK_SECRET=${NAKAMA_WEBHOOK_SECRET:-ivx-qv-rc-webhook-a7f3d9e2b8c1456f}
      # Default game is QuizVerse (matches Unity config in Assets/Resources/IntelliVerseX/QuizVerseConfig.asset).
      # The prior fallback (f6f7fe36-...) referred to "Last To Live" which is no longer shipping, and
      # caused revenue/external-polling attribution to silently target the wrong gameId.
      - DEFAULT_GAME_ID=${DEFAULT_GAME_ID:-126bf539-dae2-4bcf-964d-316c0fa1f92b}
      - APPODEAL_API_KEY=${APPODEAL_API_KEY:-}
      - APPODEAL_USER_ID=${APPODEAL_USER_ID:-}
      - APPODEAL_QUIZVERSE_APP_KEY=${APPODEAL_QUIZVERSE_APP_KEY:-}
      - UNITY_KEY_ID=${UNITY_KEY_ID:-}
      - UNITY_SECRET_KEY=${UNITY_SECRET_KEY:-}
      - UNITY_AUTH_HEADER=${UNITY_AUTH_HEADER:-}
      - UNITY_QUIZVERSE_PROJECT_ID=${UNITY_QUIZVERSE_PROJECT_ID:-}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-}
      - APPLE_ISSUER_ID=${APPLE_ISSUER_ID:-}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-}
      - APPLE_QUIZVERSE_BUNDLE_ID=${APPLE_QUIZVERSE_BUNDLE_ID:-com.intelliverse.quizverse}
      # Dashboard / admin auth
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      # Hardcoded fallback matches AA_FALLBACK_DASHBOARD_SECRET in analytics_admin.js
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:-2074ff0e9dea8fb3c8162a0301b6ea06bbb938187b89a0b6789ea583f25d34c8}
      # Phase-2 feature flags (default ON; set to "false" to disable)
      - ROLLUP_ENABLED=${ROLLUP_ENABLED:-true}
      - EXTERNAL_POLLERS_ENABLED=${EXTERNAL_POLLERS_ENABLED:-true}
      - DASHBOARD_PREFER_ROLLUPS=${DASHBOARD_PREFER_ROLLUPS:-true}
      # Heroic Labs Satori cloud (https://*.satoricloud.io). Forwarded as
      # --satori.* CLI flags by the entrypoint script above. Leave SATORI_URL
      # empty to disable the integration entirely.
      - SATORI_URL=${SATORI_URL:-}
      - SATORI_API_KEY_NAME=${SATORI_API_KEY_NAME:-}
      - SATORI_API_KEY=${SATORI_API_KEY:-}
      - SATORI_SIGNING_KEY=${SATORI_SIGNING_KEY:-}
      - SATORI_HTTP_TIMEOUT_MS=${SATORI_HTTP_TIMEOUT_MS:-2000}
      # AWS S3 for asset delivery (Star Wars character images, etc.)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - AWS_PRESIGNED_URL_EXPIRY=${AWS_PRESIGNED_URL_EXPIRY:-3600}
      # ── QuizVerse Question Cache API keys ────────────────────────────────────
      # All keys are optional; graceful fallback or skip occurs when absent.
      # News providers (failover chain: GNews → Currents → MediaStack → NewsAPI)
      - GNEWS_API_KEY=${GNEWS_API_KEY:-}
      - CURRENTS_API_KEY=${CURRENTS_API_KEY:-}
      - MEDIASTACK_API_KEY=${MEDIASTACK_API_KEY:-}
      - NEWSAPI_API_KEY=${NEWSAPI_API_KEY:-}
      # Music (Last.fm chart — top tracks/artists). Free key at last.fm/api.
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
      # Movies (TMDB — top-rated films). Free key at themoviedb.org/settings/api.
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      # Space (NASA APOD). Defaults to "DEMO_KEY" (50 req/day). Get own at api.nasa.gov.
      - NASA_API_KEY=${NASA_API_KEY:-DEMO_KEY}
      # Countries / Flags (RestCountries v5). Free key at https://restcountries.com/sign-up
      - REST_COUNTRIES_API_KEY=${REST_COUNTRIES_API_KEY:-}
      # S3 base URL override (defaults to intelli-verse-x-media bucket in code)
      - S3_BASE_URL=${S3_BASE_URL:-}
      # Admin gate for quizverse_admin_stats RPC (must match a real Nakama userId)
      - IVX_SYSTEM_USER_ID=${IVX_SYSTEM_USER_ID:-}
      # Push notification Lambda endpoints and FCM project ID
      - PUSH_REGISTER_URL=${PUSH_REGISTER_URL:-}
      - PUSH_SEND_URL=${PUSH_SEND_URL:-}
      - DEFAULT_FCM_PROJECT_ID=${DEFAULT_FCM_PROJECT_ID:-}
      # Ops alert webhooks — Discord channels for #qv-ops and #nakama-alerts
      - SLACK_OPS_WEBHOOK_URL=${SLACK_OPS_WEBHOOK_URL:-}
      - DISCORD_QV_OPS_WEBHOOK_URL=${DISCORD_QV_OPS_WEBHOOK_URL:-}
      - DISCORD_NAKAMA_WEBHOOK_URL=${DISCORD_NAKAMA_WEBHOOK_URL:-}
      # AI insights service (Phase 2A — InsightsAggregator)
      - IVX_AI_SVC_BASE_URL=${IVX_AI_SVC_BASE_URL:-}
      - IVX_INSIGHTS_SHARED_SECRET=${IVX_INSIGHTS_SHARED_SECRET:-}
      - IVX_INSIGHTS_BUCKET_MS=${IVX_INSIGHTS_BUCKET_MS:-}
      # QuizVerse CRM product telemetry (WF-09 via quizverse_product_metrics RPC)
      - QUIZVERSE_N8N_BASE_URL=${QUIZVERSE_N8N_BASE_URL:-}
      - QUIZVERSE_ADMIN_API_TOKEN=${QUIZVERSE_ADMIN_API_TOKEN:-}
      # RevenueCat Charts API v2 — admin dashboard IAP revenue (admin_revenuecat_dashboard RPC)
      - REVENUECAT_SECRET_API_KEY=${REVENUECAT_SECRET_API_KEY:-}
      - REVENUECAT_PROJECT_ID=${REVENUECAT_PROJECT_ID:-proj0d38847e}
      # Geo-aware quiz uses iTunes RSS and Deezer API — both free, no key needed
    volumes:
      - ./:/nakama/data
    expose:
      - "7349"
      - "7350"
      - "7351"
      - "9100"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
  prometheus:
    image: prom/prometheus
    entrypoint: /bin/sh -c
    command: |
      'sh -s <<EOF
        cat > ./prometheus.yml <<EON
      global:
        scrape_interval:     15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: prometheus
          static_configs:
          - targets: ['localhost:9090']

        - job_name: nakama
          metrics_path: /
          static_configs:
          - targets: ['nakama:9100']
      EON
      prometheus --config.file=./prometheus.yml
      EOF'
    ports:
      - '9090:9090'

  # Phase-2 cron sidecar. Wakes up on an interval and hits two admin RPCs
  # inside Nakama using DASHBOARD_SECRET (no login flow needed):
  #   • every 6h → external_poll_all   (Appodeal / App Store / UGS snapshots)
  #   • daily at ~01:15 UTC → analytics_rollup_run (yesterday's rollup)
  # Restart policy survives Nakama restarts; the pollers respect their own
  # rate limiting so double-runs are harmless.
  analytics_cron:
    image: curlimages/curl:8.10.1
    restart: unless-stopped
    depends_on:
      nakama:
        condition: service_healthy
    environment:
      # DASHBOARD_SECRET: hardcoded fallback matches AA_FALLBACK_DASHBOARD_SECRET
      # in analytics_admin.js. Override by setting DASHBOARD_SECRET in .env.
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:-2074ff0e9dea8fb3c8162a0301b6ea06bbb938187b89a0b6789ea583f25d34c8}
      - NAKAMA_URL=http://nakama:7350
      - HTTP_KEY=defaultkey
      - ROLLUP_HOUR_UTC=1        # daily rollup at this hour UTC
      - POLL_INTERVAL_SECS=21600 # external pollers every 6 hours
      # Bootstrap: on first start (or whenever this file is touched), run a
      # backfill over the last N days so the dashboard + retention UI have
      # immediate history instead of waiting until tomorrow's 01:00 rollup.
      # Safe to re-run — analytics_rollup_run is idempotent (overwrites doc).
      - BOOTSTRAP_BACKFILL_DAYS=${BOOTSTRAP_BACKFILL_DAYS:-7}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        echo "[analytics_cron] started — secret=$(echo $$DASHBOARD_SECRET | cut -c1-8)… rollup_hour=$$ROLLUP_HOUR_UTC poll_interval=$${POLL_INTERVAL_SECS}s bootstrap=$${BOOTSTRAP_BACKFILL_DAYS}d"
        echo "[analytics_cron] started — rollup_hour=$$ROLLUP_HOUR_UTC poll_interval=$${POLL_INTERVAL_SECS}s bootstrap=$${BOOTSTRAP_BACKFILL_DAYS}d"

        # ── Bootstrap backfill (run once per container start) ───────────
        # Fills yesterday-N..yesterday with rollup docs so the Retention tab
        # and historical dashboard queries have something to read from the
        # moment the stack boots. If events don't exist for those dates,
        # empty rollup docs are still written and the dashboard reads zeros
        # instead of tripping its "no data" branch.
        #
        # Date arithmetic: curlimages/curl is Alpine-based, which ships
        # BusyBox date. BusyBox does NOT support `date -d "N days ago"` or
        # `date -v-Nd` (those are GNU / BSD). We compute epochs with shell
        # arithmetic and format via `date -d @EPOCH` which BusyBox, GNU,
        # and BSD all accept. This keeps the sidecar portable.
        if [ "$$BOOTSTRAP_BACKFILL_DAYS" -gt 0 ] 2>/dev/null; then
          NOW_EPOCH_BOOT=$$(date -u +%s)
          FROM_EPOCH=$$((NOW_EPOCH_BOOT - BOOTSTRAP_BACKFILL_DAYS * 86400))
          TO_EPOCH=$$((NOW_EPOCH_BOOT - 86400))
          FROM_DATE=$$(date -u -d @$$FROM_EPOCH +%Y-%m-%d 2>/dev/null || date -u -r $$FROM_EPOCH +%Y-%m-%d)
          TO_DATE=$$(date -u -d @$$TO_EPOCH +%Y-%m-%d 2>/dev/null || date -u -r $$TO_EPOCH +%Y-%m-%d)
          echo "[analytics_cron] bootstrap backfill $$FROM_DATE → $$TO_DATE"
          curl -sS -X POST "$$NAKAMA_URL/v2/rpc/analytics_rollup_backfill?http_key=$$HTTP_KEY&unwrap=true" \
               -H "Content-Type: application/json" \
               --data-raw "{\"from\":\"$$FROM_DATE\",\"to\":\"$$TO_DATE\",\"dashboard_secret\":\"$$DASHBOARD_SECRET\"}" \
               -o /tmp/backfill.json -w "[analytics_cron] backfill status=%{http_code}\n" || true
          head -c 400 /tmp/backfill.json 2>/dev/null || true; echo ""
          # Also run one external_poll_all so Appodeal/AppStore/UGS snapshots
          # are warm when operators open the dashboard.
          curl -sS -X POST "$$NAKAMA_URL/v2/rpc/external_poll_all?http_key=$$HTTP_KEY" \
               -H "Content-Type: application/json" \
               --data-raw "{\"dashboard_secret\":\"$$DASHBOARD_SECRET\"}" \
               -o /tmp/poll.json -w "[analytics_cron] initial poll status=%{http_code}\n" || true
          head -c 400 /tmp/poll.json 2>/dev/null || true; echo ""
        fi

        LAST_ROLLUP_DATE=""
        # Seed LAST_POLL_EPOCH so the regular loop doesn't immediately refire the
        # initial poll we just ran above.
        LAST_POLL_EPOCH=$$(date -u +%s)
        while true; do
          NOW_EPOCH=$$(date -u +%s)
          NOW_DATE=$$(date -u +%Y-%m-%d)
          NOW_HOUR=$$(date -u +%H | sed 's/^0//')
          # ── Daily rollup: once per day at or after ROLLUP_HOUR_UTC ──
          if [ "$$NOW_DATE" != "$$LAST_ROLLUP_DATE" ] && [ "$$NOW_HOUR" -ge "$$ROLLUP_HOUR_UTC" ]; then
            # BusyBox-safe "yesterday" — see bootstrap block comment.
            YEST_EPOCH=$$((NOW_EPOCH - 86400))
            YEST=$$(date -u -d @$$YEST_EPOCH +%Y-%m-%d 2>/dev/null || date -u -r $$YEST_EPOCH +%Y-%m-%d)
            echo "[analytics_cron] $$NOW_DATE $$NOW_HOUR:00Z — running rollup for $$YEST"
            # POST JSON body; unwrap=true tells Nakama to parse the body as the RPC payload.
            ROLLUP_HTTP=$$(curl -sS -X POST "$$NAKAMA_URL/v2/rpc/analytics_rollup_run?http_key=$$HTTP_KEY&unwrap=true" \
                 -H "Content-Type: application/json" \
                 --data-raw "{\"date\":\"$$YEST\",\"dashboard_secret\":\"$$DASHBOARD_SECRET\"}" \
                 -o /tmp/rollup.json -w "%{http_code}" || echo "000")
            echo "[analytics_cron] rollup status=$$ROLLUP_HTTP"
            head -c 400 /tmp/rollup.json 2>/dev/null || true; echo ""
            if [ "$$ROLLUP_HTTP" != "200" ]; then
              echo "[analytics_cron] WARN: rollup HTTP $$ROLLUP_HTTP — will retry next cycle"
              # Do NOT update LAST_ROLLUP_DATE — the loop will retry next tick
            else
              LAST_ROLLUP_DATE="$$NOW_DATE"
            fi
          fi
          # ── External pollers: every POLL_INTERVAL_SECS ──
          if [ $$((NOW_EPOCH - LAST_POLL_EPOCH)) -ge "$$POLL_INTERVAL_SECS" ]; then
            echo "[analytics_cron] $$NOW_DATE $$NOW_HOUR:00Z — running external_poll_all"
            curl -sS -X POST "$$NAKAMA_URL/v2/rpc/external_poll_all?http_key=$$HTTP_KEY" \
                 -H "Content-Type: application/json" \
                 --data-raw "{\"dashboard_secret\":\"$$DASHBOARD_SECRET\"}" \
                 -o /tmp/poll.json -w "[analytics_cron] poll status=%{http_code}\n" || true
            head -c 400 /tmp/poll.json 2>/dev/null || true; echo ""
            LAST_POLL_EPOCH="$$NOW_EPOCH"
          fi
          # Sleep 5 minutes, then re-evaluate. Short enough to catch the rollup window,
          # long enough to not be noisy in logs.
          sleep 300
        done

volumes:
  data:
