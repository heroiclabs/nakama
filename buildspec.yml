version: 0.2

# AWS CodeBuild spec for intelliverse-nakama.
#
# Why this file exists:
#   Until now there was NO source-controlled CI for this project — the build
#   was configured directly in the AWS CodeBuild console, which made it both
#   invisible and untraceable. The previous pipeline pushed only `:latest`
#   with imagePullPolicy: Always on the deployment, so any bad push silently
#   landed in prod and any rollback required guessing the previous SHA.
#
# What this file does:
#   1. Builds Dockerfile.production (single Go toolchain, plugins + server in
#      lockstep — see that file's header for the rationale).
#   2. Tags every push with an IMMUTABLE version
#         3.0.0-<git-sha7>-build<codebuild-build-number>
#      so every image in ECR is forever uniquely addressable. We also push
#      `:latest` so legacy tooling keeps working, but the deployment is rolled
#      forward using the IMMUTABLE tag — never `:latest`.
#   3. Updates the live deployment with `kubectl set image`, mirroring the
#      manual fix used to recover from the last CrashLoopBackOff.
#
# Required CodeBuild env vars (set in the project, not here):
#   AWS_DEFAULT_REGION         e.g. us-east-1
#   AWS_ACCOUNT_ID             e.g. 970547373533
#   EKS_CLUSTER_NAME           e.g. ai-cart-auto-cluster
#   K8S_NAMESPACE              e.g. aicart
#   K8S_DEPLOYMENT             e.g. intelliverse-nakama
#   K8S_CONTAINER              e.g. intelliverse-nakama
#   ECR_REPOSITORY             e.g. intelliverse-nakama

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    AWS_ACCOUNT_ID: "970547373533"
    EKS_CLUSTER_NAME: ai-cart-auto-cluster
    K8S_NAMESPACE: aicart
    K8S_DEPLOYMENT: intelliverse-nakama
    K8S_CONTAINER: intelliverse-nakama
    ECR_REPOSITORY: intelliverse-nakama
    LLM_PROVIDER: openai
  parameter-store:
    OPENAI_API_KEY:      /nakama/OPENAI_API_KEY
    # Question-cache provider keys (all free-tier — get at the links in .env.example)
    TMDB_API_KEY:        /nakama/TMDB_API_KEY
    LASTFM_API_KEY:      /nakama/LASTFM_API_KEY
    GNEWS_API_KEY:       /nakama/GNEWS_API_KEY
    CURRENTS_API_KEY:    /nakama/CURRENTS_API_KEY
    MEDIASTACK_API_KEY:  /nakama/MEDIASTACK_API_KEY
    NEWSAPI_API_KEY:     /nakama/NEWSAPI_API_KEY
    NASA_API_KEY:        /nakama/NASA_API_KEY

phases:
  install:
    commands:
      - echo "Installing kubectl..."
      - curl -sLO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
      - chmod +x kubectl && mv kubectl /usr/local/bin/kubectl
      - kubectl version --client=true --output=yaml || true

  pre_build:
    commands:
      - echo "=== Computing image tags ==="
      - COMMIT_HASH=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c 1-7)
      - if [ -z "$COMMIT_HASH" ]; then COMMIT_HASH="nogit"; fi
      - SERVER_VERSION="3.0.0"
      - IMAGE_VERSION="${SERVER_VERSION}-${COMMIT_HASH}-build${CODEBUILD_BUILD_NUMBER}"
      - REPOSITORY_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/${ECR_REPOSITORY}"
      - echo "IMAGE_VERSION=$IMAGE_VERSION"
      - echo "REPOSITORY_URI=$REPOSITORY_URI"
      - echo "=== Logging into ECR ==="
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - echo "=== Setting up docker buildx for multi-arch (amd64+arm64) builds ==="
      - docker run --privileged --rm tonistiigi/binfmt --install arm64 || true
      - docker buildx create --use --name multiarch || docker buildx use multiarch
      - echo "=== Configuring kubectl for EKS ==="
      - aws eks update-kubeconfig --region "$AWS_DEFAULT_REGION" --name "$EKS_CLUSTER_NAME"
      - kubectl get deployment "$K8S_DEPLOYMENT" -n "$K8S_NAMESPACE" -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}' || true
      # ─── Bake the prod runtime http_key into the dashboard frontend ───
      # Why: the in-house dashboard at /analytics.html calls admin_login
      # anonymously, which Nakama gates with `?http_key=`. The frontend
      # currently hardcodes `serverKey: 'defaultkey'`, but the prod
      # Deployment runs with --runtime.http_key sourced from the k8s
      # Secret nakama-secret/http_key (a non-default value). The mismatch
      # causes Nakama to return HTTP 401 "HTTP key invalid" before our
      # admin_login JS even runs, and the dashboard renders that as a
      # generic "Invalid credentials" toast — making it look like a bad
      # password when the request never made it past the HTTP layer.
      #
      # Fix: read the cluster's actual http_key from the secret and patch
      # web/analytics-dashboard/index.html before docker build runs.
      # Dockerfile.production stage 2 then overlays the patched file onto
      # console/ui/dist/analytics.html (which is //go:embed'd into the
      # binary). Result: every build is automatically wired to whatever
      # http_key the cluster currently uses, no manual rotation, no
      # frontend rebuild needed when the secret rotates.
      #
      # If the secret doesn't exist or is empty, we fall back to
      # `defaultkey` (matches docker-compose for local dev) and log a
      # WARN. The frontend still ships, just won't auth in prod —
      # operators see the warning in CodeBuild logs and know to fix the
      # secret.
      - echo "=== Reading prod runtime http_key from nakama-secret ==="
      - >
        RUNTIME_HTTP_KEY=$(kubectl get secret nakama-secret -n "$K8S_NAMESPACE"
        -o jsonpath='{.data.http_key}' 2>/dev/null | base64 -d 2>/dev/null || true)
      - |
        if [ -z "$RUNTIME_HTTP_KEY" ]; then
          echo "WARN: secret/nakama-secret key 'http_key' not found or empty — falling back to 'defaultkey' (prod login will fail until the secret is set)"
          RUNTIME_HTTP_KEY="defaultkey"
        fi
      # Read DASHBOARD_SECRET from nakama-secret. Falls back to the same
      # constant baked into analytics_admin.js (AA_FALLBACK_DASHBOARD_SECRET).
      - |
        echo "=== Reading DASHBOARD_SECRET from nakama-secret ==="
        RUNTIME_DASHBOARD_SECRET=$(kubectl get secret nakama-secret \
          -n "$K8S_NAMESPACE" \
          -o jsonpath='{.data.dashboard_secret}' 2>/dev/null \
          | base64 -d 2>/dev/null || true)
        if [ -z "$RUNTIME_DASHBOARD_SECRET" ]; then
          echo "WARN: nakama-secret/dashboard_secret not found - using hardcoded fallback"
          RUNTIME_DASHBOARD_SECRET="2074ff0e9dea8fb3c8162a0301b6ea06bbb938187b89a0b6789ea583f25d34c8"
        fi
        echo "DASHBOARD_SECRET fingerprint=$(printf '%s' "$RUNTIME_DASHBOARD_SECRET" | cut -c1-8)..."
      - HTTP_KEY_FP="$(printf '%s' "$RUNTIME_HTTP_KEY" | head -c 4)…(len=$(printf '%s' "$RUNTIME_HTTP_KEY" | wc -c))"
      - echo "http_key fingerprint=$HTTP_KEY_FP"
      - echo "=== Patching web/analytics-dashboard/index.html serverKey ==="
      - |
        if [ -f web/analytics-dashboard/index.html ]; then
          # Use | as sed delim so any '/' in the key doesn't terminate the pattern.
          # Single-quoted in source so we match only the literal hardcoded value.
          BEFORE=$(grep -c "serverKey: 'defaultkey'" web/analytics-dashboard/index.html || true)
          sed -i "s|serverKey: 'defaultkey'|serverKey: '${RUNTIME_HTTP_KEY}'|g" web/analytics-dashboard/index.html
          AFTER=$(grep -c "serverKey: '${RUNTIME_HTTP_KEY}'" web/analytics-dashboard/index.html || true)
          echo "serverKey occurrences before=$BEFORE  after=$AFTER  (expect equal & non-zero)"
          if [ "$BEFORE" -eq 0 ] || [ "$AFTER" -eq 0 ]; then
            echo "FATAL: dashboard frontend serverKey patch failed — the literal serverKey: 'defaultkey' was not found in web/analytics-dashboard/index.html. Refusing to ship a broken dashboard."
            exit 1
          fi
          echo "=== Patching web/analytics-dashboard/index.html bootstrapSecret ==="
          BOOT_BEFORE=$(grep -c "bootstrapSecret: '2074ff0e9dea8fb3c8162a0301b6ea06bbb938187b89a0b6789ea583f25d34c8'" web/analytics-dashboard/index.html || true)
          sed -i "s|bootstrapSecret: '2074ff0e9dea8fb3c8162a0301b6ea06bbb938187b89a0b6789ea583f25d34c8'|bootstrapSecret: '${RUNTIME_DASHBOARD_SECRET}'|g" web/analytics-dashboard/index.html
          BOOT_AFTER=$(grep -c "bootstrapSecret: '${RUNTIME_DASHBOARD_SECRET}'" web/analytics-dashboard/index.html || true)
          echo "bootstrapSecret occurrences before=$BOOT_BEFORE  after=$BOOT_AFTER  (expect equal & non-zero)"
          if [ "$BOOT_BEFORE" -eq 0 ] || [ "$BOOT_AFTER" -eq 0 ]; then
            echo "FATAL: dashboard frontend bootstrapSecret patch failed — literal placeholder not found in web/analytics-dashboard/index.html."
            exit 1
          fi
        else
          echo "WARN: web/analytics-dashboard/index.html missing — Dockerfile overlay will be a no-op and the embedded legacy dashboard will be served"
        fi

  build:
    # CodeBuild's default phase semantics: post_build runs even if build
    # fails. That meant CodeBuild #193 pushed the image to ECR and rolled
    # it out even though the pre-push smoke test had failed inside this
    # phase. `on-failure: ABORT` halts the run before post_build, so a
    # failure in build/smoke-test/push never reaches the rollout step.
    on-failure: ABORT
    commands:
      - echo "=== Building image ${REPOSITORY_URI}:${IMAGE_VERSION} (amd64, loaded locally for smoke test) ==="
      # Built via buildx (same builder as the multi-arch push in post_build) so
      # the amd64 layers are cached and the post_build step only adds arm64.
      - >
        docker buildx build
        --platform linux/amd64
        --load
        -f Dockerfile.production
        --build-arg IMAGE_VERSION="$IMAGE_VERSION"
        --build-arg GIT_SHA="$CODEBUILD_RESOLVED_SOURCE_VERSION"
        -t "${REPOSITORY_URI}:${IMAGE_VERSION}"
        -t "${REPOSITORY_URI}:latest"
        .
      - echo "=== Built image SHA ==="
      - docker images --digests "${REPOSITORY_URI}" | head -5
      # ─── Pre-push smoke test (EKS-3 + CB-6 gate) ─────────────────────
      # Boot the just-built image in a throwaway compose stack and assert
      # the JS runtime actually compiled and the nakama_js_health probe
      # plus a known production RPC are registered. If this fails, abort
      # *before* pushing — bad images never reach ECR.
      - echo "=== Pre-push smoke test (JS runtime health) ==="
      - chmod +x scripts/smoke-test-js-runtime.sh
      - ./scripts/smoke-test-js-runtime.sh image "${REPOSITORY_URI}:${IMAGE_VERSION}"

  post_build:
    commands:
      # Multi-arch (amd64+arm64) build-and-push. The amd64 half is fully cached
      # from the build phase; the arm64 half cross-compiles natively (see
      # Dockerfile.production: GOARCH=$TARGETARCH on a $BUILDPLATFORM-pinned
      # builder stage — no QEMU for the Go compile). Pushes BOTH tags
      # (immutable + :latest) as a single manifest list.
      - echo "=== Building + pushing multi-arch (amd64+arm64) ${IMAGE_VERSION} and :latest ==="
      - >
        docker buildx build
        --platform linux/amd64,linux/arm64
        --provenance=false
        -f Dockerfile.production
        --build-arg IMAGE_VERSION="$IMAGE_VERSION"
        --build-arg GIT_SHA="$CODEBUILD_RESOLVED_SOURCE_VERSION"
        -t "${REPOSITORY_URI}:${IMAGE_VERSION}"
        -t "${REPOSITORY_URI}:latest"
        --push
        .
      - echo "=== Resolving immutable digest from ECR ==="
      - >
        IMAGE_DIGEST=$(aws ecr describe-images
        --repository-name "$ECR_REPOSITORY"
        --image-ids imageTag="$IMAGE_VERSION"
        --query 'imageDetails[0].imageDigest' --output text)
      - echo "IMAGE_DIGEST=$IMAGE_DIGEST"
      # ─── Capture pre-rollout image so we can auto-rollback (EKS-2) ───
      - >
        PREVIOUS_IMAGE=$(kubectl get deployment "$K8S_DEPLOYMENT" -n "$K8S_NAMESPACE"
        -o jsonpath='{.spec.template.spec.containers[0].image}')
      - echo "PREVIOUS_IMAGE=$PREVIOUS_IMAGE"
      # ─── Inject LLM + runtime secrets from Parameter Store into pod env ──
      # MUST run before `kubectl set image` so that the image update and the
      # env update are batched into a SINGLE rolling restart. If this runs
      # after the image update, Kubernetes triggers two back-to-back full
      # rolling restarts of all 10 replicas — the first for the image, the
      # second for the env — which doubles rollout time and pushes the smoke
      # test's `kubectl rollout status --timeout=14m` past its deadline
      # (root cause of the 2026-05-31 auto-rollback, builds #xxx).
      # By applying env changes first, the subsequent `kubectl set image`
      # merges both diffs into one revision and the cluster rolls each pod
      # exactly once.
      # ─── Patch deployment rollout strategy (idempotent) ──────────────────
      # The kube-infra deployment.yaml ships with Kubernetes defaults
      # (progressDeadlineSeconds=600, maxSurge=25%, maxUnavailable=25%).
      # With the HPA running at 10 replicas that means ~5 waves of 2 pods
      # each ≈ 10 min rollout — exactly matching the 600s deadline and
      # causing every deploy to auto-rollback ("exceeded its progress deadline").
      # We patch here rather than in kube-infra so this fix ships with the
      # code, not as a separate infra PR, and is idempotent on re-runs.
      #   progressDeadlineSeconds: 900  → 15 min deadline, 3 min headroom
      #   maxSurge: 4                   → 4 pods per wave, 3 waves total (~4-5 min)
      #   maxUnavailable: 0             → zero traffic loss during rollout
      - echo "=== Patching deployment rollout strategy (progressDeadline=900s, maxSurge=4) ==="
      - |
        kubectl patch deployment/"$K8S_DEPLOYMENT" -n "$K8S_NAMESPACE" \
          --type=merge \
          --patch='{"spec":{"progressDeadlineSeconds":900,"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":4,"maxUnavailable":0}}}}'
        echo "  ✓ rollout strategy patched"
      - echo "=== Injecting runtime secrets into deployment env (before image update) ==="
      - |
        INJECT_ARGS=""
        if [ -n "$OPENAI_API_KEY" ];     then INJECT_ARGS="$INJECT_ARGS OPENAI_API_KEY=$OPENAI_API_KEY";         echo "  ✓ OPENAI_API_KEY injected";     else echo "  ⚠ OPENAI_API_KEY not set"; fi
        if [ -n "$XAI_API_KEY" ];        then INJECT_ARGS="$INJECT_ARGS XAI_API_KEY=$XAI_API_KEY";             echo "  ✓ XAI_API_KEY injected";        else echo "  ⚠ XAI_API_KEY not set"; fi
        if [ -n "$LLM_PROVIDER" ];       then INJECT_ARGS="$INJECT_ARGS LLM_PROVIDER=$LLM_PROVIDER";           echo "  ✓ LLM_PROVIDER injected";       else echo "  ⚠ LLM_PROVIDER not set"; fi
        # Question-cache provider keys
        if [ -n "$TMDB_API_KEY" ];       then INJECT_ARGS="$INJECT_ARGS TMDB_API_KEY=$TMDB_API_KEY";           echo "  ✓ TMDB_API_KEY injected";       else echo "  ⚠ TMDB_API_KEY not set (movies topic disabled)"; fi
        if [ -n "$LASTFM_API_KEY" ];     then INJECT_ARGS="$INJECT_ARGS LASTFM_API_KEY=$LASTFM_API_KEY";       echo "  ✓ LASTFM_API_KEY injected";     else echo "  ⚠ LASTFM_API_KEY not set (music topic disabled)"; fi
        if [ -n "$GNEWS_API_KEY" ];      then INJECT_ARGS="$INJECT_ARGS GNEWS_API_KEY=$GNEWS_API_KEY";         echo "  ✓ GNEWS_API_KEY injected";      else echo "  ⚠ GNEWS_API_KEY not set"; fi
        if [ -n "$CURRENTS_API_KEY" ];   then INJECT_ARGS="$INJECT_ARGS CURRENTS_API_KEY=$CURRENTS_API_KEY";   echo "  ✓ CURRENTS_API_KEY injected";   else echo "  ⚠ CURRENTS_API_KEY not set"; fi
        if [ -n "$MEDIASTACK_API_KEY" ]; then INJECT_ARGS="$INJECT_ARGS MEDIASTACK_API_KEY=$MEDIASTACK_API_KEY"; echo "  ✓ MEDIASTACK_API_KEY injected"; else echo "  ⚠ MEDIASTACK_API_KEY not set"; fi
        if [ -n "$NEWSAPI_API_KEY" ];    then INJECT_ARGS="$INJECT_ARGS NEWSAPI_API_KEY=$NEWSAPI_API_KEY";     echo "  ✓ NEWSAPI_API_KEY injected";    else echo "  ⚠ NEWSAPI_API_KEY not set"; fi
        if [ -n "$NASA_API_KEY" ];       then INJECT_ARGS="$INJECT_ARGS NASA_API_KEY=$NASA_API_KEY";           echo "  ✓ NASA_API_KEY injected";       else echo "  ⚠ NASA_API_KEY not set (using DEMO_KEY)"; fi
        # Analytics env vars — always injected so the JS runtime sees them
        # regardless of what the base Deployment YAML contains. These drive
        # the dashboard auth (DASHBOARD_SECRET), rollup pipeline
        # (ROLLUP_ENABLED), and dashboard read path (DASHBOARD_PREFER_ROLLUPS).
        INJECT_ARGS="$INJECT_ARGS DASHBOARD_SECRET=$RUNTIME_DASHBOARD_SECRET"
        INJECT_ARGS="$INJECT_ARGS ROLLUP_ENABLED=true"
        INJECT_ARGS="$INJECT_ARGS DASHBOARD_PREFER_ROLLUPS=true"
        echo "  OK: DASHBOARD_SECRET injected fingerprint=$(printf '%s' "$RUNTIME_DASHBOARD_SECRET" | cut -c1-8)..."
        echo "  OK: ROLLUP_ENABLED=true injected"
        echo "  OK: DASHBOARD_PREFER_ROLLUPS=true injected"
        if [ -n "$INJECT_ARGS" ]; then
          kubectl set env deployment/"$K8S_DEPLOYMENT" -n "$K8S_NAMESPACE" $INJECT_ARGS
          echo "  ✓ kubectl set env completed"
        fi
      - echo "=== Rolling deployment to ${IMAGE_VERSION} (digest pinned) ==="
      - >
        kubectl set image
        deployment/"$K8S_DEPLOYMENT"
        "$K8S_CONTAINER"="${REPOSITORY_URI}@${IMAGE_DIGEST}"
        -n "$K8S_NAMESPACE"
      # ── Analytics CronJobs are GitOps'd in intelli-verse-kube-infra ──
      # As of intelli-verse-kube-infra#83 (2026-05-27) the two CronJobs
      # (analytics-rollup, analytics-external-poll) live at
      # `intelli-verse-kube-infra/nakama/analytics-cron.yaml` and are
      # applied via the kube-infra workflow. Applying them again from
      # this buildspec creates a race: the kube-infra apply and this
      # apply use different field-managers, which trips
      # `kubectl apply --force-conflicts` warnings and (on a bad day)
      # silently overwrites kube-infra-managed env blocks.
      #
      # If you need to roll a CronJob change quickly, edit the YAML in
      # kube-infra and `kubectl apply -f` from there. Do NOT add this
      # apply step back. The legacy YAML at deploy/analytics-cron.yaml
      # has been deleted in this PR.
      - |
        echo "=== analytics CronJobs are owned by intelli-verse-kube-infra/nakama/analytics-cron.yaml ==="
        kubectl get cronjobs -n "$K8S_NAMESPACE" -l component=analytics-cron 2>/dev/null || true
      # Post-deploy bootstrap backfill: populate analytics_rollup_daily for
      # the last 30 days so the dashboard has history immediately.
      # analytics_rollup_backfill is idempotent (safe to re-run on every deploy).
      - |
        echo "=== Running analytics bootstrap backfill (last 30 days) ==="
        set +e
        NAKAMA_EXTERNAL_URL="https://nakama-rest.intelli-verse-x.ai"
        BACKFILL_FROM=$(date -u -d "30 days ago" +%Y-%m-%d 2>/dev/null \
          || date -u -v-30d +%Y-%m-%d 2>/dev/null \
          || echo "")
        BACKFILL_TO=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null \
          || date -u -v-1d +%Y-%m-%d 2>/dev/null \
          || echo "")
        if [ -n "$BACKFILL_FROM" ] && [ -n "$BACKFILL_TO" ]; then
          echo "  Backfilling $BACKFILL_FROM to $BACKFILL_TO"
          # unwrap=true: Nakama parses the JSON body as the RPC payload, not a string.
          # --max-time 1800: 30-day backfill can take up to 30 minutes.
          # --retry 3: auto-retry on connection-level failures.
          BF_STATUS=$(curl -s -o /tmp/backfill.json -w "%{http_code}" \
            -X POST "${NAKAMA_EXTERNAL_URL}/v2/rpc/analytics_rollup_backfill?http_key=${RUNTIME_HTTP_KEY}&unwrap=true" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"${BACKFILL_FROM}\",\"to\":\"${BACKFILL_TO}\",\"dashboard_secret\":\"${RUNTIME_DASHBOARD_SECRET}\"}" \
            --max-time 1800 --retry 3 --retry-delay 30 --retry-connrefused \
            || echo "000")
          echo "  Backfill HTTP status=${BF_STATUS}"
          head -c 500 /tmp/backfill.json 2>/dev/null; echo ""
          if [ "$BF_STATUS" = "200" ] && grep -q '"success"[[:space:]]*:[[:space:]]*true' /tmp/backfill.json 2>/dev/null; then
            echo "  Backfill complete"
          else
            echo "  WARN: backfill status ${BF_STATUS} or success!=true - dashboard history populates after first nightly cron run"
          fi
        else
          echo "  WARN: could not compute date range - skipping backfill"
        fi
        set -e
      # ─── Post-rollout deploy gate (EKS-3) ─────────────────────────────
      # Block on rollout AND assert the JS runtime is healthy in the new
      # pod before we declare the build successful. This is what catches
      # the cbeacf6-class outage (pods become Ready while every JS RPC is
      # dead because the bundle didn't compile).
      - echo "=== Post-rollout JS runtime smoke test ==="
      - |
        set +e
        ./scripts/smoke-test-js-runtime.sh cluster "$K8S_NAMESPACE" "$K8S_DEPLOYMENT"
        SMOKE_RC=$?
        set -e
        ROLLED_BACK=false
        NONFATAL_ROLLOUT_BLOCKED=false

        if [ "$SMOKE_RC" -ne 0 ]; then
          echo "✗ Post-rollout smoke test FAILED — auto-rolling back to $PREVIOUS_IMAGE"
          # ─── Auto-rollback (EKS-2) ───────────────────────────────────
          # Two-tier strategy:
          #   1. If we know the previous image, set it explicitly. This is
          #      deterministic and survives rollout-history pruning.
          #   2. Fall back to `kubectl rollout undo` which uses the
          #      deployment's revision history (configured in the
          #      kube-infra deployment.yaml — should be `revisionHistoryLimit`
          #      >= 5).
          if [ -n "$PREVIOUS_IMAGE" ] && [ "$PREVIOUS_IMAGE" != "${REPOSITORY_URI}@${IMAGE_DIGEST}" ]; then
            kubectl set image deployment/"$K8S_DEPLOYMENT" \
              "$K8S_CONTAINER=$PREVIOUS_IMAGE" -n "$K8S_NAMESPACE"
          else
            kubectl rollout undo deployment/"$K8S_DEPLOYMENT" -n "$K8S_NAMESPACE"
          fi
          # Wait up to 12 minutes for the rollback (10-replica deployments can
          # be slow on a loaded cluster). Use set +e so a partial rollback
          # (e.g. 9/10 pods up within the window) doesn't itself fail the build
          # — production is substantially restored either way and the FAILED
          # status from SMOKE_RC already communicates the problem clearly.
          set +e
          kubectl rollout status deployment/"$K8S_DEPLOYMENT" -n "$K8S_NAMESPACE" --timeout=12m
          ROLLBACK_STATUS_RC=$?
          set -e
          if [ "$ROLLBACK_STATUS_RC" -ne 0 ]; then
            echo "  ⚠ rollback rollout status timed out (some pods may still be updating) — checking live pod count"
            READY_PODS=$(kubectl get deployment "$K8S_DEPLOYMENT" -n "$K8S_NAMESPACE" -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            DESIRED_PODS=$(kubectl get deployment "$K8S_DEPLOYMENT" -n "$K8S_NAMESPACE" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
            echo "  Ready: ${READY_PODS}/${DESIRED_PODS} — production is substantially restored"
          fi
          ROLLED_BACK=true
          if [ "$SMOKE_RC" -eq 3 ]; then
            NONFATAL_ROLLOUT_BLOCKED=true
            echo "Rolled back after AWS CNI pod-IP exhaustion. Build stays successful because the image smoke passed and production is restored to the previous image."
          else
            echo "Rolled back. Build marked FAILED so the pipeline stops here."
            exit 1
          fi
        fi

        echo "=== Verifying live image ==="
        LIVE_IMAGE=$(kubectl get deployment "$K8S_DEPLOYMENT" -n "$K8S_NAMESPACE" -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}')
        echo "$LIVE_IMAGE"
        kubectl get pods -n "$K8S_NAMESPACE" -l app="$K8S_DEPLOYMENT" -o wide
        printf '{"image":"%s","tag":"%s","git":"%s","previous_image":"%s","live_image":"%s","rolled_back":%s,"nonfatal_rollout_blocked":%s}\n' \
          "${REPOSITORY_URI}@${IMAGE_DIGEST}" \
          "$IMAGE_VERSION" \
          "$CODEBUILD_RESOLVED_SOURCE_VERSION" \
          "$PREVIOUS_IMAGE" \
          "$LIVE_IMAGE" \
          "$ROLLED_BACK" \
          "$NONFATAL_ROLLOUT_BLOCKED" > image-manifest.json
      # ─── Admin console (separate image) — auto build + roll on web/ changes ──
      # The console (web/packages/admin) ships as its own image+Deployment
      # (nakama-admin-dashboard), independent of the server image above. Before
      # this step, console changes required a manual rebuild+push+set-image.
      # Now any master push that touches web/ rebuilds the console from source
      # (the Dockerfile is multi-stage / self-building) and rolls the console
      # Deployment automatically. NON-FATAL by design: a console build/rollout
      # failure logs a WARN and never fails the build or rolls back the server.
      - |
        echo "=== Admin console deploy (nakama-admin-dashboard) ==="
        set +e
        ADMIN_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/nakama-admin-dashboard"
        ADMIN_TAG="${IMAGE_VERSION}"
        WEB_CHANGED="unknown"
        if git rev-parse "${CODEBUILD_RESOLVED_SOURCE_VERSION}~1" >/dev/null 2>&1; then
          if git diff --name-only "${CODEBUILD_RESOLVED_SOURCE_VERSION}~1" "${CODEBUILD_RESOLVED_SOURCE_VERSION}" | grep -q '^web/'; then
            WEB_CHANGED="yes"
          else
            WEB_CHANGED="no"
          fi
        fi
        echo "  web/ changed in this commit: ${WEB_CHANGED}"
        if [ "${WEB_CHANGED}" = "no" ]; then
          echo "  No web/ changes — skipping console rebuild (current console image stays live)."
        else
          echo "  Building console image ${ADMIN_REPO}:${ADMIN_TAG} (context: web/)"
          if docker buildx build --platform linux/amd64,linux/arm64 --provenance=false -f web/packages/admin/Dockerfile -t "${ADMIN_REPO}:${ADMIN_TAG}" -t "${ADMIN_REPO}:latest" --push web; then
            echo "  multi-arch console image pushed (amd64+arm64)"
            ADMIN_DIGEST=$(aws ecr describe-images --repository-name nakama-admin-dashboard --image-ids imageTag="${ADMIN_TAG}" --query 'imageDetails[0].imageDigest' --output text 2>/dev/null)
            if [ -n "${ADMIN_DIGEST}" ] && [ "${ADMIN_DIGEST}" != "None" ]; then
              kubectl set image deployment/nakama-admin-dashboard admin-dashboard="${ADMIN_REPO}@${ADMIN_DIGEST}" -n "$K8S_NAMESPACE"
              kubectl rollout status deployment/nakama-admin-dashboard -n "$K8S_NAMESPACE" --timeout=180s
              echo "  ✓ console rolled to ${ADMIN_TAG}"
            else
              echo "  WARN: could not resolve console image digest — skipping console rollout."
            fi
          else
            echo "  WARN: console image build failed — leaving current console image in place (server deploy unaffected)."
          fi
        fi
        set -e

artifacts:
  files:
    - image-manifest.json
  name: nakama-build-${CODEBUILD_BUILD_NUMBER}

cache:
  paths:
    - '/root/.cache/go-build/**/*'
    - '/go/pkg/mod/**/*'
